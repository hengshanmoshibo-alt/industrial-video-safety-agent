  <text x="32" y="201" class="label">Feishu alert success</text><rect x="260" y="180" width="360" height="24" rx="4" class="track"/><rect x="260" y="180" width="360" height="24" rx="4" class="bar"/><text x="640" y="199" class="value">100%</text>
  <text x="32" y="255" class="label">High-risk alerts</text><rect x="260" y="234" width="360" height="24" rx="4" class="track"/><rect x="260" y="234" width="360" height="24" rx="4" class="bar"/><text x="640" y="253" class="value">1</text>
</svg>
