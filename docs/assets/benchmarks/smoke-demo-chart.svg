    .label { font: 14px Arial, sans-serif; fill: #1f2937; }
    .value { font: 700 14px Arial, sans-serif; fill: #111827; }
    .track { fill: #e5e7eb; }
    .bar { fill: #1677ff; }
  </style>
  <rect class="bg" width="760" height="324" rx="8"/>
  <text x="32" y="34" class="title">Smoke Demo Benchmark</text>
