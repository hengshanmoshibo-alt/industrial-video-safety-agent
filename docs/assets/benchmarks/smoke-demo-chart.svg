  <text x="32" y="93" class="label">Processing success</text><rect x="260" y="72" width="360" height="24" rx="4" class="track"/><rect x="260" y="72" width="360" height="24" rx="4" class="bar"/><text x="640" y="91" class="value">100%</text>
