<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Industrial Video Safety Agent Architecture</title>
  <desc id="desc">Layered architecture diagram for a multimodal industrial safety inspection Agent platform.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title{font:700 30px Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}
      .subtitle{font:500 15px Inter,Segoe UI,Arial,sans-serif;fill:#64748b}
      .lane-title{font:700 14px Inter,Segoe UI,Arial,sans-serif;fill:#334155;letter-spacing:.08em}
      .card-title{font:700 15px Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}
      .card-sub{font:500 12px Inter,Segoe UI,Arial,sans-serif;fill:#64748b}
      .small{font:600 12px Inter,Segoe UI,Arial,sans-serif;fill:#475569}
      .pill{font:700 11px Inter,Segoe UI,Arial,sans-serif;fill:#1d4ed8}
      .card{fill:#ffffff;stroke:#dbeafe;stroke-width:1.4;rx:16;filter:url(#shadow)}
      .mini{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.2;rx:12}
      .accent{fill:#eff6ff;stroke:#bfdbfe;stroke-width:1.2;rx:12}
      .success{fill:#ecfdf5;stroke:#bbf7d0;stroke-width:1.2;rx:12}
      .warn{fill:#fff7ed;stroke:#fed7aa;stroke-width:1.2;rx:12}
      .line{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#94a3b8;stroke-width:1.7;fill:none;stroke-dasharray:5 5;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="34" y="34" width="1212" height="692" rx="30" fill="#ffffff" opacity=".74"/>

  <text x="70" y="82" class="title">Industrial Video Safety Agent Architecture</text>
  <text x="70" y="111" class="subtitle">Video input -> video memory -> VLM grounding -> policy decision -> alert / review / ticket / verification</text>

  <rect x="70" y="146" width="180" height="500" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="96" y="178" class="lane-title">ENTRY</text>
  <rect x="96" y="214" width="128" height="74" class="card"/>
  <text x="122" y="244" class="card-title">React UI</text>
  <text x="114" y="267" class="card-sub">Safety console</text>
  <rect x="96" y="330" width="128" height="74" class="accent"/>
  <text x="115" y="360" class="card-title">Upload</text>
  <text x="113" y="383" class="card-sub">Video evidence</text>
  <rect x="96" y="446" width="128" height="74" class="mini"/>
  <text x="114" y="476" class="card-title">MCP Client</text>
  <text x="113" y="499" class="card-sub">External Agent</text>

  <rect x="292" y="146" width="230" height="500" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="320" y="178" class="lane-title">API &amp; BUSINESS</text>
  <rect x="326" y="214" width="162" height="74" class="card"/>
  <text x="358" y="244" class="card-title">API Gateway</text>
  <text x="356" y="267" class="card-sub">JWT / routing</text>
  <rect x="326" y="330" width="162" height="74" class="card"/>
  <text x="346" y="360" class="card-title">Video Audit</text>
  <text x="352" y="383" class="card-sub">Task + report API</text>
  <rect x="326" y="446" width="162" height="74" class="card"/>
  <text x="357" y="476" class="card-title">Ticket API</text>
  <text x="349" y="499" class="card-sub">Remediation loop</text>

  <rect x="562" y="146" width="360" height="500" rx="24" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="594" y="178" class="lane-title">AGENT WORKER</text>
  <rect x="594" y="210" width="296" height="76" rx="18" fill="url(#agent)" filter="url(#shadow)"/>
  <text x="628" y="242" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800" fill="#ffffff">Agent Orchestrator</text>
  <text x="628" y="266" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="600" fill="#dbeafe">persistent AgentRun + AgentStep trace</text>

  <rect x="594" y="324" width="132" height="70" class="card"/>
  <text x="624" y="352" class="card-title">FFmpeg</text>
  <text x="618" y="374" class="card-sub">frame sampling</text>
  <rect x="758" y="324" width="132" height="70" class="card"/>
  <text x="792" y="352" class="card-title">Qwen3-VL</text>
  <text x="783" y="374" class="card-sub">bbox grounding</text>
  <rect x="594" y="432" width="132" height="70" class="card"/>
  <text x="611" y="460" class="card-title">Video Memory</text>
  <text x="615" y="482" class="card-sub">segments + raw VLM</text>
  <rect x="758" y="432" width="132" height="70" class="card"/>
  <text x="773" y="460" class="card-title">Safety Policy</text>
  <text x="779" y="482" class="card-sub">decide actions</text>
  <rect x="676" y="540" width="132" height="70" class="card"/>
  <text x="696" y="568" class="card-title">Report Writer</text>
  <text x="705" y="590" class="card-sub">Chinese report</text>

  <rect x="962" y="146" width="248" height="500" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="992" y="178" class="lane-title">DATA &amp; ACTIONS</text>
  <rect x="992" y="214" width="186" height="58" class="mini"/>
  <text x="1036" y="238" class="card-title">PostgreSQL</text>
  <text x="1020" y="258" class="card-sub">audits, steps, memory</text>
  <rect x="992" y="296" width="186" height="58" class="mini"/>
  <text x="1044" y="320" class="card-title">Redis Queue</text>
  <text x="1036" y="340" class="card-sub">async jobs</text>
  <rect x="992" y="378" width="186" height="58" class="mini"/>
  <text x="1032" y="402" class="card-title">Object Storage</text>
  <text x="1020" y="422" class="card-sub">videos + evidence</text>
  <rect x="992" y="476" width="86" height="62" class="warn"/>
  <text x="1016" y="503" class="card-title">Feishu</text>
  <text x="1015" y="523" class="card-sub">alert</text>
  <rect x="1094" y="476" width="86" height="62" class="accent"/>
  <text x="1111" y="503" class="card-title">Review</text>
  <text x="1114" y="523" class="card-sub">HITL</text>
  <rect x="992" y="562" width="86" height="62" class="success"/>
  <text x="1016" y="589" class="card-title">Ticket</text>
  <text x="1011" y="609" class="card-sub">fix task</text>
  <rect x="1094" y="562" width="86" height="62" class="success"/>
  <text x="1106" y="589" class="card-title">Verify</text>
  <text x="1104" y="609" class="card-sub">after fix</text>

  <path class="line" d="M224 251 H326"/>
  <path class="line" d="M224 367 H326"/>
  <path class="dash" d="M224 483 H326"/>
  <path class="line" d="M488 367 H562"/>
  <path class="line" d="M742 286 V324"/>
  <path class="line" d="M726 359 H758"/>
  <path class="line" d="M660 394 V432"/>
  <path class="line" d="M824 394 V432"/>
  <path class="line" d="M726 467 H758"/>
  <path class="line" d="M824 502 C824 530 792 540 760 552"/>
  <path class="line" d="M890 467 H992"/>
  <path class="line" d="M890 359 H992"/>
  <path class="line" d="M890 247 H992"/>
  <path class="line" d="M758 210 C880 184 932 298 992 320"/>
  <path class="line" d="M890 467 C938 478 960 498 992 507"/>
  <path class="line" d="M890 467 C950 468 1036 498 1094 507"/>
  <path class="line" d="M890 467 C940 548 948 580 992 593"/>
  <path class="line" d="M1078 593 H1094"/>

  <rect x="70" y="672" width="1140" height="34" rx="17" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="92" y="694" class="pill">Key idea</text>
  <text x="160" y="694" class="small">VLM perception is separated from policy decisions; uncertain evidence pauses for human review instead of becoming an automatic violation.</text>
</svg>
