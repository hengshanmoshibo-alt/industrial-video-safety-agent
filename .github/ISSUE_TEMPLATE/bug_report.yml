name: Bug report
description: Report a reproducible issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide exact commands or UI steps.
      placeholder: |
        1. docker compose -f docker-compose.safety.yml up -d --build
        2. Upload ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Do not paste API keys, webhook URLs, or private videos.
      render: shell
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11 / Docker Desktop / Python 3.12 / Node 22
