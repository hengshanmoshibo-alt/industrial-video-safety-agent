services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aicoding
      POSTGRES_USER: aicoding
      POSTGRES_PASSWORD: aicoding
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data
    volumes:
      - minio_data:/minio_data

  milvus:
    image: milvusdb/milvus:v2.5.4
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - etcd
      - minio
    ports:
      - "19531:19530"
      - "9092:9091"
    volumes:
      - milvus_data:/var/lib/milvus

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    env_file: .env
    depends_on:
      - auth-service
      - conversation-service
      - ticket-service
      - knowledge-service
      - ai-orchestrator
      - channel-service
      - analytics-service
      - video-audit-service
    ports:
      - "8000:8000"

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis

  conversation-service:
    build:
      context: .
      dockerfile: services/conversation-service/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - ai-orchestrator

  ticket-service:
    build:
      context: .
      dockerfile: services/ticket-service/Dockerfile
    env_file: .env
    depends_on:
      - postgres

  knowledge-service:
    build:
      context: .
      dockerfile: services/knowledge-service/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - milvus

  ai-orchestrator:
    build:
      context: .
      dockerfile: services/ai-orchestrator/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - knowledge-service

  channel-service:
    build:
      context: .
      dockerfile: services/channel-service/Dockerfile
    env_file: .env
    depends_on:
      - postgres

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - milvus

  video-audit-service:
    build:
      context: .
      dockerfile: services/video-audit-service/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  video-worker:
    build:
      context: .
      dockerfile: services/video-worker/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  frontend:
    build: ./frontend
    depends_on:
      - api-gateway
    ports:
      - "5173:80"

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - milvus
      - redis
    ports:
      - "8010:8000"

volumes:
  postgres_data:
  etcd_data:
  minio_data:
  milvus_data:
