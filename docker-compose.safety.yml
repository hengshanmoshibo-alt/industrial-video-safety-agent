services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aicoding
      POSTGRES_USER: aicoding
      POSTGRES_PASSWORD: aicoding
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data
    volumes:
      - minio_data:/minio_data

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis

  ticket-service:
    build:
      context: .
      dockerfile: services/ticket-service/Dockerfile
    env_file: .env
    depends_on:
      - postgres

  video-audit-service:
    build:
      context: .
      dockerfile: services/video-audit-service/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  video-worker:
    build:
      context: .
      dockerfile: services/video-worker/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - ./data:/app/data
      - ./models:/app/models

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    env_file: .env
    depends_on:
      - auth-service
      - ticket-service
      - video-audit-service
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - api-gateway
    ports:
      - "5173:80"

volumes:
  postgres_data:
  minio_data:
